<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LunkBanana 🍌</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFE135;
      --deep-yellow: #F5C400;
      --brown: #4A2C0A;
      --cream: #FFFBEA;
      --green: #3A7D44;
      --shadow: #c49a00;
    }

    body {
      background-color: var(--cream);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating banana background */
    .bg-bananas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-banana {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.12;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.12; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--yellow);
      border: 4px solid var(--brown);
      border-radius: 32px;
      padding: 3rem 3.5rem;
      text-align: center;
      box-shadow: 8px 8px 0px var(--shadow), 14px 14px 0px var(--brown);
      max-width: 480px;
      width: 90%;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7) rotate(-4deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .emoji-big {
      font-size: 5rem;
      display: block;
      margin-bottom: 0.5rem;
      animation: wobble 2.5s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-6deg); }
      50%       { transform: rotate(6deg); }
    }

    h1 {
      font-family: 'Boogaloo', cursive;
      font-size: 3.5rem;
      color: var(--brown);
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: 3px 3px 0 var(--shadow);
    }

    .tagline {
      font-size: 1rem;
      color: var(--brown);
      opacity: 0.75;
      margin-bottom: 2rem;
      font-weight: 700;
    }

    .btn {
      background: var(--brown);
      color: var(--yellow);
      font-family: 'Boogaloo', cursive;
      font-size: 1.6rem;
      padding: 0.85rem 2.5rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 4px 4px 0 #2a1500;
      letter-spacing: 1px;
    }
    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #2a1500;
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #2a1500;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      margin-top: 1.25rem;
      font-size: 0.95rem;
      color: var(--brown);
      min-height: 1.4rem;
      font-weight: 700;
    }

    .status-ok   { color: var(--green); }
    .status-err  { color: #c0392b; }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--brown);
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- Floating background bananas -->
  <div class="bg-bananas" id="bgBananas"></div>

  <div class="card">
    <span class="emoji-big">🍌</span>
    <h1>LunkBanana</h1>
    <p class="tagline">The world's most important banana finder.</p>
    <button class="btn" id="findBtn" onclick="findBanana()">🍌 Find Me a Banana!</button>
    <p id="status"></p>
  </div>

  <p class="footer">Powered by GPS &amp; pure banana energy.</p>

  <script>
    // Spawn floating background bananas
    const bg = document.getElementById('bgBananas');
    for (let i = 0; i < 18; i++) {
      const b = document.createElement('div');
      b.classList.add('bg-banana');
      b.textContent = '🍌';
      b.style.left = Math.random() * 100 + 'vw';
      b.style.fontSize = (1.5 + Math.random() * 3) + 'rem';
      b.style.animationDuration = (8 + Math.random() * 14) + 's';
      b.style.animationDelay = (Math.random() * 12) + 's';
      bg.appendChild(b);
    }

    function findBanana() {
      const btn = document.getElementById('findBtn');
      const status = document.getElementById('status');

      if (!navigator.geolocation) {
        status.textContent = '❌ Your browser doesn\'t support geolocation. Try Chrome or Firefox!';
        status.className = 'status-err';
        return;
      }

      btn.disabled = true;
      status.className = '';
      status.textContent = '📍 Finding your location...';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          const query = encodeURIComponent('grocery store bananas');
          const url = `https://www.google.com/maps/search/${query}/@${latitude},${longitude},14z`;
          status.textContent = '✅ Found you! Opening banana map...';
          status.className = 'status-ok';
          setTimeout(() => {
            window.open(url, '_blank');
            btn.disabled = false;
            status.textContent = '🍌 Go get that banana!';
          }, 800);
        },
        (err) => {
          btn.disabled = false;
          status.className = 'status-err';
          if (err.code === 1) {
            status.textContent = '❌ Location access denied. Please allow location in your browser.';
          } else {
            status.textContent = '❌ Couldn\'t get your location. Try again!';
          }
        },
        { timeout: 10000 }
      );
    }
  </script>
</body>
</html>
